<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>BikeToWork — Denver</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <div id="map"></div>
      <div id="controls">
        <h3>Bike vs Transit — Denver Metro</h3>
        <p id="instructions">Click map to set origin and destination. Both points must be within the Denver Metro geofence.</p>
        <div id="presets">
          <label for="presetSelect">Presets:</label>
          <select id="presetSelect" aria-label="Preset locations">
            <option value="">— select —</option>
            <option value="downtown">Downtown (16th St Mall)</option>
            <option value="union">Union Station</option>
            <option value="dtech">Denver Tech Center</option>
            <option value="centralpark">Central Park / Stapleton</option>
          </select>
          <button id="presetSetOrigin">Set Origin</button>
          <button id="presetSetDest">Set Destination</button>
        </div>

        <div id="compare">
          <h4>Comparison</h4>
          <div id="compareSummary">No comparison yet.</div>
          <div id="compareBar"><div id="compareFill"></div></div>
        </div>
        <div id="userPrefs">
          <label for="weight">Weight (kg)</label>
          <input id="weight" type="number" min="30" max="200" value="70" aria-label="Weight in kilograms" />
        </div>
        <div id="buttons">
          <button id="clear">Clear</button>
          <button id="routeBike">Get Safer Route</button>
        </div>
        <div id="results">
          <h4>Bike</h4>
          <div id="bikeResult">No route yet.</div>
          <div id="bikeStats" aria-live="polite"></div>
          <h4>Route (Safer by default)</h4>
          <div id="routeResult">No route yet.</div>
          <div id="routeInfo"></div>
        </div>
      </div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="app.js"></script>
  </body>
</html>
