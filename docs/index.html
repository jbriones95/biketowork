<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>BikeToWork — Denver</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <div id="map"></div>
      <div id="controls">
        <h3>Bike vs Transit — Denver Metro</h3>
        <p id="instructions">Click map to set origin and destination. Both points must be within the Denver Metro geofence.</p>
        <div id="compare">
          <h4>Comparison</h4>
          <div id="compareSummary">No comparison yet.</div>
          <div id="compareBar"><div id="compareFill"></div></div>
        </div>
        <div id="buttons">
          <button id="clear">Clear</button>
          <button id="routeBike">Get Bike Route</button>
          <button id="routeTransit">Get Transit Route</button>
        </div>
        <div id="results">
          <h4>Bike</h4>
          <div id="bikeResult">No route yet.</div>
          <h4>Transit</h4>
          <div id="transitResult">Transit routing not configured. See README to add a transit provider or enable a proxy.</div>
          <div id="transitAlternatives"></div>
        </div>
      </div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="app.js"></script>
  </body>
</html>
